<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadAssistent - Every Lead Counts</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f7fb;
}

.lang{
  position:fixed;
  top:20px;
  right:20px;
  background:#fff;
  padding:8px;
  border-radius:40px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  display:flex;
  gap:8px;
}

.lang button{
  border:none;
  padding:8px 14px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  background:transparent;
}

.lang button.active{
  background:#1F5EFF;
  color:white;
}

.container{
  max-width:900px;
  margin:120px auto;
  text-align:center;
}

h1{
  font-size:36px;
}

p{
  font-size:18px;
  color:#555;
}
</style>
</head>

<body>

<!-- LANGUAGE SWITCH (EN FIRST) -->
<div class="lang">
  <button id="btn-en" class="active" onclick="setLanguage('en')">🇬🇧 EN</button>
  <button id="btn-nl" onclick="setLanguage('nl')">🇳🇱 NL</button>
</div>

<div class="container">
  <h1 data-i18n="title">LeadAssistent - Every Lead Counts</h1>
  <p data-i18n="subtitle">
    Automated responses so you never miss a lead again.
  </p>
</div>

<script>
const translations = {
  en: {
    title: "LeadAssistent - Every Lead Counts",
    subtitle: "Automated responses so you never miss a lead again."
  },
  nl: {
    title: "LeadAssistent - Elke lead telt",
    subtitle: "Automatische reacties zodat je geen enkele lead meer mist."
  }
};

function setLanguage(lang){
  document.documentElement.lang = lang;

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    el.textContent = translations[lang][key];
  });

  document.getElementById("btn-en").classList.remove("active");
  document.getElementById("btn-nl").classList.remove("active");
  document.getElementById("btn-" + lang).classList.add("active");
}

// Force English on load
setLanguage("en");
</script>

</body>
</html>
